seed: 42
max_target_length: 512

image_size:
  height: 448
  width: 448
  channels: 1
  pad_value: 255
  normalize_mean: null
  normalize_std: null

augmentation:
  enabled: true
  brightness: 0.08
  contrast: 0.08
  gaussian_blur_prob: 0.03
  affine_degrees: 1.5
  affine_translate: 0.01
  random_erasing_prob: 0.00

training:
  num_train_epochs: 5
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  max_grad_norm: 1.0
  fp16: true
  bf16: false
  dataloader_num_workers: 2
  logging_steps: 25
  logging_strategy: steps
  logging_first_step: true
  log_level: info
  stable_tqdm: true
  tqdm_mininterval: 5.0
  tqdm_miniters: 10
  tqdm_ncols: 100
  tqdm_ascii: false
  eval_steps: 1000
  save_steps: 1000
  save_total_limit: 2
  eval_strategy: steps
  save_strategy: steps
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  report_to:
    - tensorboard

lora:
  enabled: false
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: null

freeze:
  encoder: false

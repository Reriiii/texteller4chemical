seed: 42
max_target_length: 1024

data:
  target_key: targets.ssml_graph_norm
  train_target_key: targets.ssml_graph_norm
  eval_target_key: targets.ssml_graph_norm
  target_length_policy: filter

image_size:
  height: 448
  width: 448
  channels: 1
  pad_value: 255
  trim_white_border: true
  trim_threshold: 15
  resize_mode: texteller
  pad_position: top_left
  normalize_mean: 0.9545467
  normalize_std: 0.15394445

augmentation:
  enabled: true
  profile: texteller_ocr
  random_resize_min: 0.85
  random_resize_max: 1.10
  rotate_prob: 0.15
  rotate_degrees: 4.0
  random_border_max: 18
  min_augmented_size: 30
  augraphy_enabled: false
  max_augmentation_side: 4096
  log_augmentation_downscale: false
  brightness: 0.03
  contrast: 0.03
  gaussian_blur_prob: 0.00
  affine_degrees: 0.5
  affine_translate: 0.003
  random_erasing_prob: 0.00

sampling:
  length_balanced:
    enabled: false

training:
  num_train_epochs: 5
  learning_rate: 3.0e-5
  weight_decay: 0.01
  warmup_steps: 20
  lr_scheduler_type: cosine
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  gradient_checkpointing: true
  dataloader_num_workers: 2
  dataloader_pin_memory: true
  dataloader_persistent_workers: false
  dataloader_prefetch_factor: 2
  logging_steps: 10
  logging_strategy: steps
  logging_first_step: true
  log_level: info
  log_level_replica: error
  log_on_each_node: false
  ddp_find_unused_parameters: false
  stable_tqdm: true
  tqdm_by_epoch: true
  tqdm_mininterval: 2.0
  tqdm_miniters: 1
  tqdm_ncols: 100
  tqdm_ascii: false
  save_total_limit: 2
  eval_strategy: epoch
  save_strategy: epoch
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  report_to: []

eval_metrics:
  enabled: false
  batch_size: 2
  max_samples: 50
  sample_seed: 42
  num_beams: 1
  max_new_tokens: 1024
  use_cache: false
  empty_cache: true
  graph_eval: false
  graph_matching_tool_dir: external/GraphMatchingTool
  graph_label_key: ssml_graph_norm
  graph_num_workers: 0
  require_graph_eval: false

lora:
  enabled: false
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules: auto
  target_scope: all
  bias: none
  modules_to_save: null

freeze:
  encoder: false

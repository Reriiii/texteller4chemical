seed: 42
max_target_length: 1024

data:
  target_key: targets.ssml_sd
  train_target_key: targets.ssml_sd
  eval_target_key: targets.ssml_sd
  target_length_policy: filter

image_size:
  height: 448
  width: 448
  channels: 1
  pad_value: 255
  trim_white_border: true
  trim_threshold: 15
  resize_mode: texteller
  pad_position: top_left
  normalize_mean: 0.9545467
  normalize_std: 0.15394445

augmentation:
  enabled: true
  profile: texteller_ocr
  random_resize_min: 0.75
  random_resize_max: 1.15
  rotate_prob: 0.20
  rotate_degrees: 5.0
  random_border_max: 25
  min_augmented_size: 30
  augraphy_enabled: true
  max_augmentation_side: 4096
  log_augmentation_downscale: false
  brightness: 0.05
  contrast: 0.05
  gaussian_blur_prob: 0.02
  affine_degrees: 1.0
  affine_translate: 0.005
  random_erasing_prob: 0.00

sampling:
  length_balanced:
    enabled: true
    bins:
      - max_length: 192
        weight: 1.0
      - max_length: 384
        weight: 1.5
      - max_length: 640
        weight: 2.5
      - max_length: 1024
        weight: 3.5
      - max_length: null
        weight: 3.5

training:
  num_train_epochs: 30
  learning_rate: 3.0e-5
  weight_decay: 0.01
  warmup_steps: 3000
  lr_scheduler_type: cosine
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  gradient_checkpointing: false
  dataloader_num_workers: 12
  dataloader_pin_memory: true
  dataloader_persistent_workers: true
  dataloader_prefetch_factor: 4
  logging_steps: 100
  logging_strategy: epoch
  logging_first_step: false
  log_level: warning
  log_level_replica: error
  log_on_each_node: false
  ddp_find_unused_parameters: false
  stable_tqdm: true
  tqdm_by_epoch: true
  tqdm_mininterval: 5.0
  tqdm_miniters: 10
  tqdm_ncols: 100
  tqdm_ascii: false
  save_total_limit: 3
  eval_strategy: epoch
  save_strategy: epoch
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  report_to:
    - tensorboard

lora:
  enabled: false
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules: auto
  target_scope: all
  bias: none
  modules_to_save: null

freeze:
  encoder: false

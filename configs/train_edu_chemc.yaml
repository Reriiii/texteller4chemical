seed: 42
max_target_length: 768

data:
  target_length_policy: filter

image_size:
  height: 448
  width: 448
  channels: 1
  pad_value: 255
  normalize_mean: null
  normalize_std: null

augmentation:
  enabled: true
  brightness: 0.08
  contrast: 0.08
  gaussian_blur_prob: 0.03
  affine_degrees: 1.5
  affine_translate: 0.01
  random_erasing_prob: 0.00

sampling:
  length_balanced:
    enabled: true
    bins:
      - max_length: 256
        weight: 1.0
      - max_length: 512
        weight: 1.5
      - max_length: 768
        weight: 3.0
      - max_length: null
        weight: 2.0

training:
  num_train_epochs: 30
  learning_rate: 3.0e-5
  weight_decay: 0.01
  warmup_steps: 2650
  lr_scheduler_type: cosine
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  gradient_checkpointing: false
  dataloader_num_workers: 2
  logging_steps: 100
  logging_strategy: epoch
  logging_first_step: false
  log_level: warning
  log_level_replica: error
  log_on_each_node: false
  ddp_find_unused_parameters: false
  stable_tqdm: true
  tqdm_by_epoch: true
  tqdm_mininterval: 5.0
  tqdm_miniters: 10
  tqdm_ncols: 100
  tqdm_ascii: false
  eval_steps: 13250
  save_steps: 13250
  save_total_limit: 4
  eval_strategy: steps
  save_strategy: steps
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  report_to:
    - tensorboard

lora:
  enabled: true
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules: auto
  target_scope: all
  bias: none
  modules_to_save: null

freeze:
  encoder: true

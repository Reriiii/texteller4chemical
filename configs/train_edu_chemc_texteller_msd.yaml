seed: 42
max_target_length: 1024

data:
  target_key: targets.ssml_rfl
  train_target_key: targets.ssml_rfl
  eval_target_key: targets.ssml_rfl
  target_length_policy: filter
  rfl_aux_field: rfl

image_size:
  height: 448
  width: 448
  channels: 1
  pad_value: 255
  trim_white_border: true
  trim_threshold: 15
  resize_mode: texteller
  pad_position: top_left
  normalize_mean: 0.9545467
  normalize_std: 0.15394445

augmentation:
  enabled: true
  profile: texteller_ocr
  random_resize_min: 0.75
  random_resize_max: 1.15
  rotate_prob: 0.20
  rotate_degrees: 5.0
  random_border_max: 25
  min_augmented_size: 30
  augraphy_enabled: true
  max_augmentation_side: 4096
  log_augmentation_downscale: false
  brightness: 0.05
  contrast: 0.05
  gaussian_blur_prob: 0.02
  affine_degrees: 1.0
  affine_translate: 0.005
  random_erasing_prob: 0.00

vocab:
  file: external/RFL-MSD/dict/vocab.txt
  extend_from_dataset: true
  extend_splits:
    - train
  min_frequency: 1
  max_added_tokens: null

msd_model:
  encoder_hidden_size: 768
  encoder_dim: 384
  decoder_state_dim: 256
  decoder_embed_dim: 128
  decoder_att_dim: 128
  decoder_merge_dim: 384
  decoder_chatt_dim: 384
  decoder_cover_kernel: [11, 11]
  decoder_cover_padding: [5, 5]
  decoder_dropout: 0.20
  decoder_embed_drop: 0.15
  decoder_mem_match_dim: 256

loss:
  lambda_sequence: 1.0
  lambda_memory: 1.0

training:
  num_train_epochs: 10
  learning_rate: 3.0e-5
  weight_decay: 0.01
  warmup_steps: 3000
  lr_scheduler_type: cosine
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  gradient_checkpointing: true
  freeze_encoder_epochs: 0
  dataloader_num_workers: 8
  dataloader_pin_memory: true
  dataloader_persistent_workers: true
  dataloader_prefetch_factor: 4
  metric_for_best_model: eval_loss
  greater_is_better: false
  save_each_epoch: false

eval_metrics:
  enabled: false
  batch_size: 1
  max_samples: 100
  num_beams: 5
  max_new_tokens: 1024
  graph_eval: true
  graph_matching_tool_dir: external/GraphMatchingTool
  graph_label_key: ssml_rfl_graph_norm
  graph_num_workers: 8
  rfl_tool_dir: external/RFL-MSD
